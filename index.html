<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Banner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:transparent;
}

/* Fireworks Canvas */
#fireworks{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:transparent;
    z-index:1;
    pointer-events:none;
}

/* Banner */
.banner{
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    height:150px;
    transform:translateY(-50%);
    overflow:hidden;
    z-index:10;
    padding:40px 0;
}

/* Metallic Gold Strip */
.gold-strip{
    position:relative;
    width:100%;
    height:180px;

    background:
    linear-gradient(
        90deg,
        #5c4300 0%,
        #b8860b 10%,
        #ffd700 20%,
        #fff8dc 30%,
        #ffd700 40%,
        #b8860b 50%,
        #ffd700 60%,
        #fff8dc 70%,
        #ffd700 80%,
        #b8860b 90%,
        #5c4300 100%
    );

    box-shadow:
        inset 0 8px 15px rgba(255,255,255,.6),
        inset 0 -8px 15px rgba(0,0,0,.5),
        0 0 40px rgba(255,215,0,.7);

    overflow:hidden;
}

/* Glitter Shine */
.gold-strip::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:60%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.8),
        transparent
    );

    animation:shine 4s linear infinite;
}

@keyframes shine{
    from{
        left:-100%;
    }
    to{
        left:150%;
    }
}

/* Text Container - keeps text vertically centered */
.text-track{
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    transform:translateY(-50%);
    overflow:hidden;
}

/* Moving Text */
.welcome{
    display:inline-block;
    font-size:70px;
    font-weight:900;
    font-family:Georgia, serif;
    letter-spacing:3px;
    white-space:nowrap;

    color:#111;

    text-shadow:
        1px 1px 0 rgba(255,255,255,.15),
        -1px -1px 0 rgba(0,0,0,.5),
        2px 2px 3px rgba(255,255,255,.15),
        -2px -2px 3px rgba(0,0,0,.6);

    animation:moveTrain 25s linear infinite;
}

@keyframes moveTrain{
    from{
        transform:translateX(100vw);
    }
    to{
        transform:translateX(-120%);
    }
}

/* Engraved Text */
.welcome{
    font-size:70px;
    font-weight:900;
    font-family:Georgia, serif;
    letter-spacing:3px;

    color:#111;

    text-shadow:
        1px 1px 0 rgba(255,255,255,.15),
        -1px -1px 0 rgba(0,0,0,.5),
        2px 2px 3px rgba(255,255,255,.15),
        -2px -2px 3px rgba(0,0,0,.6);

    padding:0 50px;
}

/* Glitter Particles */
.sparkle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:sparkle 2s linear infinite;
}

@keyframes sparkle{
    0%{
        opacity:0;
        transform:scale(0);
    }
    50%{
        opacity:1;
        transform:scale(2);
    }
    100%{
        opacity:0;
        transform:scale(0);
    }
}

@media(max-width:768px){

    .gold-strip{
        height:120px;
    }

    .welcome{
        font-size:40px;
    }
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="banner">
    <div class="gold-strip" id="goldStrip">

        <div class="text-track">
            <div class="welcome">
                🎉 Welcome to the Community Procurement and Infrastructure Division Portal! Your gateway to real-time monitoring, implementation updates, and environmental sustainability initiatives across Cordillera Regions! 🎉
            </div>
        </div>

    </div>
</div>

<script>
/* ==========================
   Glitter Sparkles
========================== */

const strip = document.getElementById("goldStrip");

for(let i=0;i<80;i++){

    const s = document.createElement("div");
    s.classList.add("sparkle");

    s.style.left = Math.random()*100 + "%";
    s.style.top = Math.random()*100 + "%";

    s.style.animationDelay =
        Math.random()*2 + "s";

    s.style.animationDuration =
        (1 + Math.random()*2) + "s";

    strip.appendChild(s);
}

/* ==========================
   Real Fireworks
========================== */

const canvas =
document.getElementById("fireworks");

const ctx =
canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resize();
window.addEventListener("resize",resize);

const particles = [];

class Particle{

    constructor(x,y,color){

        this.x=x;
        this.y=y;

        this.color=color;

        const angle =
        Math.random()*Math.PI*2;

        const speed =
        Math.random()*8+2;

        this.vx=Math.cos(angle)*speed;
        this.vy=Math.sin(angle)*speed;

        this.life=100;
    }

    update(){

        this.x+=this.vx;
        this.y+=this.vy;

        this.vy+=0.03;

        this.life--;
    }

    draw(){

        ctx.beginPath();

        ctx.fillStyle=
        this.color;

        ctx.globalAlpha=
        this.life/100;

        ctx.arc(
            this.x,
            this.y,
            3,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.globalAlpha=1;
    }
}

function launchFirework(){

    const x =
    Math.random()*canvas.width;

    const y =
    Math.random()*canvas.height*0.5;

    const colors = [
        "#ff0000",
        "#00ff00",
        "#00ffff",
        "#ff00ff",
        "#ffff00",
        "#ffffff",
        "#ffd700"
    ];

    const color =
    colors[
      Math.floor(
      Math.random()*colors.length
      )
    ];

    for(let i=0;i<150;i++){

        particles.push(
            new Particle(
                x,
                y,
                color
            )
        );
    }
}

setInterval(
    launchFirework,
    1000
);

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let i=
        particles.length-1;
        i>=0;
        i--){

        particles[i].update();
        particles[i].draw();

        if(
          particles[i].life<=0
        ){
            particles.splice(i,1);
        }
    }

    requestAnimationFrame(
        animate
    );
}

animate();
</script>

</body>
</html>
